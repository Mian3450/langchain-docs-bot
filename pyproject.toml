[project]
name = "langchain-docs-bot"
version = "0.1.0"
description = "Telegram bot that answers questions about LangChain documentation using a RAG pipeline"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "Matvii Chepur" }]

# NOTE: Concrete pinned versions live in requirements.txt (generated from the
# first successful resolution). The ranges here document intent; CI installs
# from requirements.txt for reproducibility.
dependencies = [
    "aiogram>=3.13,<4",
    "langchain>=0.3,<0.4",
    "langchain-openai>=0.2,<0.4",
    # Free-tier LLM provider (default). OpenAI-compatible API, no card needed.
    "langchain-groq>=0.2,<0.4",
    "langchain-chroma>=0.2,<0.3",
    "langchain-community>=0.3,<0.4",
    "langchain-text-splitters>=0.3,<0.4",
    # Local ONNX embeddings (default). Pulls in `fastembed`, runtime ~150MB
    # including the small bge model — much lighter than torch/sentence-transformers.
    "fastembed>=0.4,<0.8",
    # chromadb 1.x ships prebuilt wheels (Rust hnsw bindings) — no C++ toolchain
    # needed; 0.x pulled chroma-hnswlib which fails to build without Visual Studio.
    "chromadb>=1.0,<2",
    "openai>=1.40,<2",
    "pydantic-settings>=2.4,<3",
    "structlog>=24.1,<26",
    "python-frontmatter>=1.1,<2",
    "httpx>=0.27,<0.29",
    # Use the OS trust store for TLS (fixes corporate MITM-proxy CA issues);
    # no-op on machines without a custom root CA.
    "truststore>=0.9,<1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9",
    "pytest-asyncio>=0.24,<0.26",
    "ruff>=0.6,<0.13",
    "mypy>=1.11,<2",
]
eval = [
    "deepeval>=1.0,<4",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM", "ASYNC"]
ignore = ["E501"]  # line length handled by formatter

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
disallow_untyped_defs = true
# Third-party libs without complete stubs:
[[tool.mypy.overrides]]
module = [
    "chromadb.*",
    "deepeval.*",
    "langchain_community.*",
    "langchain_groq.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]
